<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdoraGigs | High-Value Gigs, Simplified</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --teal: #64ffda;
            --white: #e6f1ff;
            --gold: #ffc107;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--navy);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container { padding: 20px; max-width: 800px; z-index: 2; }

        .logo-area { margin-bottom: 30px; position: relative; }
        
        /* Simulating the Star icon */
        .star { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }

        h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; }
        h1 span { color: var(--teal); font-weight: 300; }

        p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 40px; }

        .tagline {
            display: inline-block;
            background: rgba(100, 255, 218, 0.1);
            color: var(--teal);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .waitlist-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 15px 25px;
            border-radius: 5px;
            border: none;
            width: 300px;
            font-family: inherit;
            outline: none;
        }

        button {
            padding: 15px 30px;
            border-radius: 5px;
            border: none;
            background-color: var(--teal);
            color: var(--navy);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(100, 255, 218, 0.3); }

        .footer { position: absolute; bottom: 30px; font-size: 0.8rem; opacity: 0.5; }

        /* Simple background animation */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--teal);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="logo-area">
            <div class="star">★</div>
            <h1>Adora<span>Gigs</span></h1>
        </div>

        <div class="tagline">High-Value Gigs, Simplified</div>
        
        <p>The bridge between next-gen talent and world-class opportunities. <br> 
        We are building something premium. Be the first to know when we launch.</p>

        <form class="waitlist-form">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Get Early Access</button>
        </form>

        <div class="footer">
            &copy; 2026 AdoraGigs. Crafted with ❤️ by Adarsh & Co-founder.
        </div>
    </div>
</body>
</html>
